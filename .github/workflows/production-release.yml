name: Production Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────
  # 1. VALIDATE
  # ─────────────────────────────────────────────
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

  # ─────────────────────────────────────────────
  # 2. DEPLOY TO VERCEL
  # ─────────────────────────────────────────────
  deploy:
    name: deploy-production
    runs-on: ubuntu-latest
    needs: [validate]
    if: success()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Deploy to production
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "Deployed to: ${URL}"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────
  # 3. SMOKE TESTS
  # ─────────────────────────────────────────────
  smoke-tests:
    name: smoke-tests
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: Wait for deployment
        run: sleep 30

      - name: Check health endpoint
        run: |
          URL="${{ secrets.PRODUCTION_APP_URL }}"
          if [ -z "$URL" ]; then
            echo "[SKIP] PRODUCTION_APP_URL not configured"
            exit 0
          fi
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/api/health" --max-time 15)
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "[OK] Health endpoint: HTTP ${HTTP_STATUS}"
          else
            echo "[WARN] Health endpoint: HTTP ${HTTP_STATUS}"
          fi

      - name: Check login page
        run: |
          URL="${{ secrets.PRODUCTION_APP_URL }}"
          if [ -z "$URL" ]; then
            echo "[SKIP] PRODUCTION_APP_URL not configured"
            exit 0
          fi
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/login" --max-time 15)
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "302" ] || [ "$HTTP_STATUS" = "307" ]; then
            echo "[OK] Login page: HTTP ${HTTP_STATUS}"
          else
            echo "[FAIL] Login page: HTTP ${HTTP_STATUS}"
            exit 1
          fi

  # ─────────────────────────────────────────────
  # 4. CREATE GITHUB RELEASE
  # ─────────────────────────────────────────────
  release:
    name: create-release
    runs-on: ubuntu-latest
    needs: [smoke-tests]
    if: success()
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: version
        run: |
          # Get latest release tag
          LATEST_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: ${LATEST_TAG}"

          # Strip 'v' prefix and split
          VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Determine bump type from input or commit messages
          BUMP="${{ github.event.inputs.version_bump }}"
          if [ -z "$BUMP" ]; then
            # Auto-detect from commit messages since last release
            COMMITS=$(git log ${LATEST_TAG}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")
            if echo "$COMMITS" | grep -qiE "^BREAKING|^feat!"; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qiE "^feat"; then
              BUMP="minor"
            else
              BUMP="patch"
            fi
          fi

          # Bump version
          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "bump_type=${BUMP}" >> "$GITHUB_OUTPUT"
          echo "New version: ${NEW_TAG} (${BUMP} bump)"

      - name: Generate release notes
        id: notes
        run: |
          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          BUMP="${{ steps.version.outputs.bump_type }}"

          # Get previous tag
          PREV_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")

          # Get commits since last release
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "v0.0.0" ]; then
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"%h|%s|%an" --no-merges 2>/dev/null)
          else
            COMMITS=$(git log --pretty=format:"%h|%s|%an" --no-merges -20 2>/dev/null)
          fi

          # Build summary (one-liner)
          SUMMARY=$(git log ${PREV_TAG}..HEAD --pretty=format:"%s" --no-merges 2>/dev/null | head -1)
          if [ -z "$SUMMARY" ]; then
            SUMMARY="Production deployment"
          fi

          # Build features list
          FEATURES=""
          while IFS='|' read -r hash subject author; do
            [ -z "$hash" ] && continue
            if echo "$subject" | grep -qiE "^feat"; then
              # Clean up conventional commit prefix
              CLEAN=$(echo "$subject" | sed -E 's/^feat(\([^)]*\))?!?:[ ]*//')
              FEATURES="${FEATURES}- ${CLEAN} (${hash})\n"
            fi
          done <<< "$COMMITS"

          if [ -z "$FEATURES" ]; then
            FEATURES="_No new features in this release._\n"
          fi

          # Build full changelog
          CHANGELOG=""
          while IFS='|' read -r hash subject author; do
            [ -z "$hash" ] && continue
            # Determine type
            if echo "$subject" | grep -qiE "^feat"; then
              TYPE="✨ Feature"
            elif echo "$subject" | grep -qiE "^fix"; then
              TYPE="🐛 Fix"
            elif echo "$subject" | grep -qiE "^refactor"; then
              TYPE="♻️ Refactor"
            elif echo "$subject" | grep -qiE "^test"; then
              TYPE="🧪 Test"
            elif echo "$subject" | grep -qiE "^docs"; then
              TYPE="📚 Docs"
            elif echo "$subject" | grep -qiE "^chore|^ci|^build"; then
              TYPE="🔧 Chore"
            else
              TYPE="📝 Other"
            fi
            CHANGELOG="${CHANGELOG}- **${TYPE}:** ${subject} (${hash})\n"
          done <<< "$COMMITS"

          # Write release body
          cat > /tmp/release-body.md << EOF
          ## Summary

          ${SUMMARY}

          ## Features

          $(echo -e "$FEATURES")
          ## Changelog

          $(echo -e "$CHANGELOG")
          **Full diff:** [\`${PREV_TAG}...${NEW_TAG}\`](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${NEW_TAG})
          EOF

          echo "body_path=/tmp/release-body.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          BUMP="${{ steps.version.outputs.bump_type }}"

          gh release create "${NEW_TAG}" \
            --title "Production Release ${NEW_TAG}" \
            --notes-file /tmp/release-body.md \
            --verify-tag \
            --target main
