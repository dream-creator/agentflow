name: Production Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────
  # 1. VALIDATE
  # ─────────────────────────────────────────────
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

  # ─────────────────────────────────────────────
  # 2. DEPLOY TO VERCEL
  # ─────────────────────────────────────────────
  deploy:
    name: deploy-production
    runs-on: ubuntu-latest
    needs: [validate]
    if: success()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Deploy to production
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "Deployed to: ${URL}"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────
  # 3. SMOKE TESTS
  # ─────────────────────────────────────────────
  smoke-tests:
    name: smoke-tests
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: Wait for deployment
        run: sleep 30

      - name: Check health endpoint
        run: |
          URL="${{ secrets.PRODUCTION_APP_URL }}"
          if [ -z "$URL" ]; then
            echo "[SKIP] PRODUCTION_APP_URL not configured"
            exit 0
          fi
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/api/health" --max-time 15)
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "[OK] Health endpoint: HTTP ${HTTP_STATUS}"
          else
            echo "[WARN] Health endpoint: HTTP ${HTTP_STATUS}"
          fi

      - name: Check login page
        run: |
          URL="${{ secrets.PRODUCTION_APP_URL }}"
          if [ -z "$URL" ]; then
            echo "[SKIP] PRODUCTION_APP_URL not configured"
            exit 0
          fi
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/login" --max-time 15)
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "302" ] || [ "$HTTP_STATUS" = "307" ]; then
            echo "[OK] Login page: HTTP ${HTTP_STATUS}"
          else
            echo "[FAIL] Login page: HTTP ${HTTP_STATUS}"
            exit 1
          fi

  # ─────────────────────────────────────────────
  # 4. CREATE GITHUB RELEASE
  # ─────────────────────────────────────────────
  release:
    name: create-release
    runs-on: ubuntu-latest
    needs: [smoke-tests]
    if: success()
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get latest release tag — try multiple methods
          LATEST_TAG=$(gh release view --json tagName --jq '.tagName' 2>/dev/null || echo "")
          
          # Fallback: check git tags
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG=$(git tag --sort=-v:refname | head -1 2>/dev/null || echo "")
          fi
          
          # Final fallback
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          
          echo "Latest tag: ${LATEST_TAG}"

          # Strip 'v' prefix and split
          VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Ensure we have valid numbers
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          # Determine bump type from input or commit messages
          BUMP="${{ github.event.inputs.version_bump }}"
          if [ -z "$BUMP" ]; then
            # Auto-detect from commit messages since last release
            COMMITS=$(git log ${LATEST_TAG}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s" -20)
            if echo "$COMMITS" | grep -qiE "^BREAKING|^feat!"; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qiE "^feat"; then
              BUMP="minor"
            else
              BUMP="patch"
            fi
          fi

          # Bump version
          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          
          # Check if tag already exists, increment if needed
          while git rev-parse "$NEW_TAG" >/dev/null 2>&1; do
            echo "Tag ${NEW_TAG} already exists, incrementing patch..."
            PATCH=$((PATCH + 1))
            NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          done

          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "bump_type=${BUMP}" >> "$GITHUB_OUTPUT"
          echo "New version: ${NEW_TAG} (${BUMP} bump)"

      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          # Get previous tag — try multiple methods
          PREV_TAG=$(gh release view --json tagName --jq '.tagName' 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1 2>/dev/null || echo "")
          fi
          
          RELEASE_DATE=$(date +%Y-%m-%d)
          REPO_URL="https://github.com/${{ github.repository }}"
          
          # Extract version numbers from NEW_TAG
          VERSION="${NEW_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Get commits since last release
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "v0.0.0" ]; then
            COMMIT_RANGE="${PREV_TAG}..HEAD"
            PREV_DISPLAY="${PREV_TAG}"
          else
            COMMIT_RANGE="HEAD"
            PREV_DISPLAY="(initial)"
          fi

          # Collect all data — use § as commit separator, | as field separator
          ALL_COMMITS=$(git log ${COMMIT_RANGE} --pretty=format:"%h§%s§%b§%an§%ae" --no-merges 2>/dev/null)
          COMMIT_COUNT=$(git log ${COMMIT_RANGE} --oneline --no-merges 2>/dev/null | wc -l)
          FILES_CHANGED=$(git diff --stat ${COMMIT_RANGE} 2>/dev/null | tail -1)
          ADDITIONS=$(echo "$FILES_CHANGED" | grep -oP '\d+(?= insertion)' || echo "0")
          DELETIONS=$(echo "$FILES_CHANGED" | grep -oP '\d+(?= deletion)' || echo "0")
          
          # Get contributors: workflow actor + commit authors
          WORKFLOW_ACTOR="${{ github.actor }}"
          COMMIT_AUTHORS=$(git log ${COMMIT_RANGE} --pretty=format:"%an|%ae" --no-merges 2>/dev/null | sort -u)
          
          # Build contributors list with GitHub usernames
          CONTRIBUTORS=""
          
          # Add workflow actor first (person who triggered the release)
          if [ -n "$WORKFLOW_ACTOR" ] && [ "$WORKFLOW_ACTOR" != "github-actions[bot]" ]; then
            CONTRIBUTORS="${WORKFLOW_ACTOR}"
          fi
          
          # Add commit authors
          while IFS='|' read -r name email; do
            [ -z "$name" ] && continue
            # Extract username from email (before @)
            USERNAME=$(echo "$email" | cut -d'@' -f1 | sed 's/^.*+//')
            # Skip bots
            if echo "$USERNAME" | grep -qiE "bot|github-actions|noreply"; then
              continue
            fi
            # Skip if already in list
            if echo "$CONTRIBUTORS" | grep -qiF "$USERNAME"; then
              continue
            fi
            if [ -n "$CONTRIBUTORS" ]; then
              CONTRIBUTORS="${CONTRIBUTORS} ${USERNAME}"
            else
              CONTRIBUTORS="${USERNAME}"
            fi
          done <<< "$COMMIT_AUTHORS"
          
          # Fallback if no contributors found
          if [ -z "$CONTRIBUTORS" ]; then
            CONTRIBUTORS="github-actions[bot]"
          fi

          # Categorize commits
          FEATURES=""
          IMPROVEMENTS=""
          BUG_FIXES=""
          BREAKING=""
          OTHER_CHANGES=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            
            # Parse: hash§subject§body§author§email
            HASH=$(echo "$line" | cut -d'§' -f1)
            SUBJECT=$(echo "$line" | cut -d'§' -f2)
            BODY=$(echo "$line" | cut -d'§' -f3- | sed 's/§.*//')
            AUTHOR=$(echo "$line" | cut -d'§' -f4)
            
            [ -z "$HASH" ] && continue
            
            # Extract prefix type and clean subject
            PREFIX_TYPE=""
            CLEAN=""
            
            if echo "$SUBJECT" | grep -qiE "^feat"; then
              PREFIX_TYPE="feat"
              CLEAN=$(echo "$SUBJECT" | sed -E 's/^feat[^:]*:[ ]*//')
            elif echo "$SUBJECT" | grep -qiE "^fix"; then
              PREFIX_TYPE="fix"
              CLEAN=$(echo "$SUBJECT" | sed -E 's/^fix[^:]*:[ ]*//')
            elif echo "$SUBJECT" | grep -qiE "^refactor"; then
              PREFIX_TYPE="refactor"
              CLEAN=$(echo "$SUBJECT" | sed -E 's/^refactor[^:]*:[ ]*//')
            elif echo "$SUBJECT" | grep -qiE "^perf"; then
              PREFIX_TYPE="perf"
              CLEAN=$(echo "$SUBJECT" | sed -E 's/^perf[^:]*:[ ]*//')
            elif echo "$SUBJECT" | grep -qiE "^test"; then
              PREFIX_TYPE="test"
              CLEAN=$(echo "$SUBJECT" | sed -E 's/^test[^:]*:[ ]*//')
            elif echo "$SUBJECT" | grep -qiE "^docs"; then
              PREFIX_TYPE="docs"
              CLEAN=$(echo "$SUBJECT" | sed -E 's/^docs[^:]*:[ ]*//')
            elif echo "$SUBJECT" | grep -qiE "^ci"; then
              PREFIX_TYPE="ci"
              CLEAN=$(echo "$SUBJECT" | sed -E 's/^ci[^:]*:[ ]*//')
            elif echo "$SUBJECT" | grep -qiE "^chore"; then
              PREFIX_TYPE="chore"
              CLEAN=$(echo "$SUBJECT" | sed -E 's/^chore[^:]*:[ ]*//')
            elif echo "$SUBJECT" | grep -qiE "^BREAKING|^feat!"; then
              PREFIX_TYPE="breaking"
              CLEAN=$(echo "$SUBJECT" | sed -E 's/^(BREAKING CHANGE|feat!)!?:[ ]*//')
            else
              PREFIX_TYPE="other"
              CLEAN="$SUBJECT"
            fi

            # Fallback: if sed didn't strip the prefix, use the full subject
            if [ -z "$CLEAN" ]; then
              CLEAN="$SUBJECT"
            fi

            # Format body: extract meaningful lines (skip empty, skip commit msg separators)
            FORMATTED_BODY=""
            if [ -n "$BODY" ]; then
              FORMATTED_BODY=$(echo "$BODY" | sed '/^[[:space:]]*$/d' | sed '/^Change-Id:/d' | sed '/^Co-authored-by:/d' | sed '/^Reviewed-by:/d' | sed '/^Signed-off-by:/d' | sed 's/^[[:space:]]*//')
            fi

            # Build entry: title + optional body bullets
            ENTRY="- ${CLEAN} (#${HASH})"
            if [ -n "$FORMATTED_BODY" ]; then
              ENTRY="${ENTRY}\n"
              while IFS= read -r bodyline; do
                [ -z "$bodyline" ] && continue
                ENTRY="${ENTRY}  ${bodyline}\n"
              done <<< "$FORMATTED_BODY"
            fi

            # Categorize into sections
            case "$PREFIX_TYPE" in
              feat)
                FEATURES="${FEATURES}${ENTRY}\n"
                ;;
              fix)
                BUG_FIXES="${BUG_FIXES}${ENTRY}\n"
                ;;
              refactor|perf)
                IMPROVEMENTS="${IMPROVEMENTS}${ENTRY}\n"
                ;;
              breaking)
                BREAKING="${BREAKING}${ENTRY}\n"
                ;;
              *)
                OTHER_CHANGES="${OTHER_CHANGES}${ENTRY}\n"
                ;;
            esac
          done <<< "$ALL_COMMITS"

          # Build summary from first meaningful commit
          SUMMARY=$(echo "$ALL_COMMITS" | head -1 | cut -d'§' -f2)
          if [ -z "$SUMMARY" ]; then
            SUMMARY="Production deployment with latest fixes and improvements."
          fi

          # Write release body
          cat > /tmp/release-body.md << EOF
          ## v${MAJOR}.${MINOR}.${PATCH} -- Production Release

          **Released:** ${RELEASE_DATE}
          **Tag:** ${NEW_TAG}
          **Branch:** main
          **Type:** Production Release
          **Previous Release:** ${PREV_DISPLAY}

          ---

          ## Overview

          ${SUMMARY}

          ---

          ## Breaking Changes

          $([ -n "$BREAKING" ] && echo -e "$BREAKING" || echo "No breaking changes in this release.")

          ---

          ## What's New

          ### Features

          $([ -n "$FEATURES" ] && echo -e "$FEATURES" || echo "_No new features in this release._")

          ### Improvements

          $([ -n "$IMPROVEMENTS" ] && echo -e "$IMPROVEMENTS" || echo "_No improvements in this release._")

          ### Bug Fixes

          $([ -n "$BUG_FIXES" ] && echo -e "$BUG_FIXES" || echo "_No bug fixes in this release._")

          ---

          ## Other Changes

          $([ -n "$OTHER_CHANGES" ] && echo -e "$OTHER_CHANGES" || echo "_No other changes in this release._")

          ---

          ## Dependency Updates

          _No dependency updates in this release._

          ---

          ## Migration Guide

          ### Upgrading from ${PREV_DISPLAY} to ${NEW_TAG}

          #### Step 1 -- Update your dependency

          \`\`\`bash
          npm install agentflow@${MAJOR}.${MINOR}.${PATCH}
          # or
          yarn add agentflow@${MAJOR}.${MINOR}.${PATCH}
          \`\`\`

          #### Step 2 -- Review breaking changes

          $([ -n "$BREAKING" ] && echo "Review the Breaking Changes section above for any required changes." || echo "No breaking changes -- no additional steps required.")

          ---

          ## Release Stats

          | Metric | Value |
          |--------|-------|
          | Commits since ${PREV_DISPLAY} | ${COMMIT_COUNT} |
          | Files changed | $(echo "$FILES_CHANGED" | tr -s ' ' | cut -d' ' -f1) |
          | Additions / Deletions | +${ADDITIONS} / -${DELETIONS} |
          | Contributors | $(echo "$CONTRIBUTORS" | tr ' ' '\n' | grep -c . | tr -d ' ') |

          ---

          ## Contributors

          Thank you to everyone who contributed to this release.

          $(echo "$CONTRIBUTORS" | tr ' ' '\n' | while read -r username; do [ -n "$username" ] && echo "- @${username}"; done)

          ---

          ## Resources

          | Link | Description |
          |------|-------------|
          | [Full Changelog](${REPO_URL}/compare/${PREV_DISPLAY}...${NEW_TAG}) | All commits in this diff |
          | [Report a Bug](${REPO_URL}/issues/new) | Submit a bug report |
          | [Discussions](${REPO_URL}/discussions) | Questions and community |

          <details>
          <summary>Full Commit Log (${PREV_DISPLAY} to ${NEW_TAG})</summary>

          \`\`\`
          $(git log ${COMMIT_RANGE} --oneline --no-merges 2>/dev/null)
          \`\`\`

          </details>
          EOF

          # Fix indentation
          sed -i 's/^          //' /tmp/release-body.md

          echo "body_path=/tmp/release-body.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          
          # Create the tag first
          git tag "${NEW_TAG}"
          git push origin "${NEW_TAG}"
          
          # Then create the release
          gh release create "${NEW_TAG}" \
            --title "${NEW_TAG}" \
            --notes-file /tmp/release-body.md \
            --target main
