name: PR Gatekeeper

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [develop, main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  SUPABASE_PROJECT_ID: fsxdduvwshirrheenmag

jobs:
  lint-and-typecheck:
    name: lint-typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint -- --max-warnings 0

      - name: TypeScript check
        run: npx tsc --noEmit

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    # Runs `next build` with placeholder env vars to catch the class of
    # build-only errors (CSR bailout / useSearchParams, missing static
    # asset refs, Server Component client-import violations) that
    # `tsc` and `next lint` can't see. The full Vercel build happens
    # in `preview-deploy` below; this is a fast-feedback check that
    # fails the PR before the more expensive preview + Lighthouse
    # steps. Placeholder values are safe because the build only
    # inlines NEXT_PUBLIC_* vars into the bundle — it doesn't
    # actually connect to any service.
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Next.js build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_placeholder"
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: "1x00000000000000000000AA"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          NEXT_PUBLIC_TURNSTILE_TEST_BYPASS: "false"

  security-audit:
    name: security-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (production only)
        run: |
          echo "Auditing production dependencies only..."
          echo "Dev dependency vulns (eslint, typescript, lighthouse) are excluded —"
          echo "they do not affect the deployed application."
          echo "Next.js 14.x high-severity CVEs are excluded — Vercel patches"
          echo "these at the edge and we don't use the affected features"
          echo "(Image Optimizer, Pages Router i18n, CSP nonces)."
          npm audit --omit=dev --audit-level=critical
          echo "[OK] No critical production vulnerabilities"

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, security-audit, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npx vitest run --coverage --reporter=verbose
        env:
          CI: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  coverage-gate:
    name: coverage-gate
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: ${{ needs.unit-tests.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Enforce coverage thresholds
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "[FAIL] No coverage report found"
            exit 1
          fi

          GLOBAL_LINES=$(node -e "const c=require('./coverage/coverage-summary.json');console.log(c.total.lines.pct)")
          echo "Global line coverage: ${GLOBAL_LINES}%"

          if [ $(echo "$GLOBAL_LINES < 75" | bc) -eq 1 ]; then
            echo "[FAIL] Global coverage ${GLOBAL_LINES}% is below 75% threshold"
            exit 1
          fi
          echo "[OK] Global coverage ${GLOBAL_LINES}% meets 75% threshold"

  preview-deploy:
    name: preview-deploy
    runs-on: ubuntu-latest
    needs: [coverage-gate]
    outputs:
      preview-url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Link to preview project
        run: supabase link --project-ref ${{ env.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply preview migrations
        run: |
          # Session-mode pooler (port 5432) avoids pgbouncer prepared-statement
          # leaks that block supabase db push on the transaction pooler (6543).
          SESSION_DB_URL=$(echo "${{ secrets.STAGING_SUPABASE_DB_URL }}" | sed 's/:6543/:5432/')
          supabase db push --db-url "$SESSION_DB_URL" || true

      - name: Validate type sync
        run: |
          SESSION_DB_URL=$(echo "${{ secrets.STAGING_SUPABASE_DB_URL }}" | sed 's/:6543/:5432/')
          npx supabase gen types typescript --db-url "$SESSION_DB_URL" > /tmp/generated-types.ts 2>/dev/null || true
          echo "--- SUPABASE CLI VERSION ---"
          npx supabase --version 2>/dev/null || true
          echo "--- DIFF OUTPUT (up to 50 lines) ---"
          diff types/supabase.ts /tmp/generated-types.ts | head -50 || true
          echo "--- END DIFF ---"
          if ! diff -q types/supabase.ts /tmp/generated-types.ts > /dev/null 2>&1; then
            echo "[FAIL] types/supabase.ts is out of sync with the current schema."
            echo "Run 'supabase gen types typescript > types/supabase.ts' locally and commit the result."
            exit 1
          fi
          echo "[OK] Types are in sync"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "[OK] Preview deployed: ${URL}"

      - name: Health check
        run: |
          MAX_RETRIES=10
          RETRY_DELAY=6
          URL="${{ steps.deploy.outputs.url }}"

          echo "Waiting for deployment to stabilize..."
          sleep 30

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Health check attempt $i of $MAX_RETRIES..."

            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/" 2>/dev/null || echo "000")

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "[OK] Health check passed (HTTP ${HTTP_STATUS})"
              exit 0
            fi

            echo "[WARN] Got HTTP ${HTTP_STATUS}, retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
            RETRY_DELAY=$((RETRY_DELAY + 6))
          done

          echo "[FAIL] Health check failed after $MAX_RETRIES attempts"
          exit 1

  lighthouse-ci:
    name: lighthouse-ci
    runs-on: ubuntu-latest
    needs: [preview-deploy]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ needs.preview-deploy.outputs.url }}/
            ${{ needs.preview-deploy.outputs.url }}/login
          budgetPath: ./lighthouse-budget.json
          uploadArtifacts: true

  pr-comment-summary:
    name: pr-comment
    runs-on: ubuntu-latest
    needs: [preview-deploy, lighthouse-ci, coverage-gate, unit-tests, build]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - name: Download coverage
        uses: actions/download-artifact@v4
        if: ${{ needs.unit-tests.result == 'success' }}
        with:
          name: coverage-report
          path: coverage/

      - name: Generate summary
        id: summary
        run: |
          COVERAGE="N/A"
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(node -e "const c=require('./coverage/coverage-summary.json');console.log(c.total.lines.pct+'%')")
          fi

          cat << 'EOF' > /tmp/pr-comment.md
          ## CI/CD Pipeline Results

          | Check | Status |
          |-------|--------|
          EOF

          echo "| Lint & TypeCheck | ${{ needs.lint-and-typecheck.result == 'success' && '[PASSED]' || '[FAILED]' }} |" >> /tmp/pr-comment.md
          echo "| Build | ${{ needs.build.result == 'success' && '[PASSED]' || '[FAILED]' }} |" >> /tmp/pr-comment.md
          echo "| Security Audit | ${{ needs.security-audit.result == 'success' && '[PASSED]' || '[FAILED]' }} |" >> /tmp/pr-comment.md
          echo "| Unit Tests | ${{ needs.unit-tests.result == 'success' && '[PASSED]' || '[FAILED]' }} |" >> /tmp/pr-comment.md
          echo "| Coverage Gate | ${{ needs.coverage-gate.result == 'success' && '[PASSED]' || '[FAILED]' }} ($COVERAGE) |" >> /tmp/pr-comment.md
          echo "| Preview Deploy | ${{ needs.preview-deploy.result == 'success' && '[PASSED]' || '[FAILED]' }} |" >> /tmp/pr-comment.md
          echo "| Lighthouse CI | ${{ needs.lighthouse-ci.result == 'success' && '[PASSED]' || '[FAILED]' }} |" >> /tmp/pr-comment.md
          echo "" >> /tmp/pr-comment.md
          echo "**Preview URL:** ${{ needs.preview-deploy.outputs.preview-url }}" >> /tmp/pr-comment.md

      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: /tmp/pr-comment.md
